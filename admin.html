<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Plate - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-['Work_Sans']">
    <!-- Navbar -->
    <nav class="bg-teal-700 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold font-['Plus_Jakarta_Sans']">Green Plate Admin</h1>
            <a href="/" class="text-teal-100 hover:text-white transition">View Website</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-6 mt-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Add New Item Form -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
            <h2 class="text-xl font-bold mb-4 font-['Plus_Jakarta_Sans'] text-teal-800">Add Menu Item</h2>
            <form id="addItemForm" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" id="name" required class="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="description" rows="2" class="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-teal-500 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price ($)</label>
                        <input type="number" step="0.01" id="price" required class="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <input type="text" id="category" class="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                    <input type="url" id="imageUrl" class="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <button type="submit" class="mt-2 bg-teal-600 text-white py-2 rounded-lg font-medium hover:bg-teal-700 transition">Add Item</button>
            </form>
        </div>

        <!-- Menu List -->
        <div class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4 font-['Plus_Jakarta_Sans'] text-teal-800">Current Menu Items</h2>
            <div id="menuList" class="flex flex-col gap-4">
                <!-- Items will be loaded here dynamically -->
                <div class="text-center text-gray-500 py-8">Loading items...</div>
            </div>
        </div>
    </main>

    <!-- Orders Section -->
    <section class="max-w-6xl mx-auto p-6 mt-2">
        <h2 class="text-xl font-bold mb-4 font-['Plus_Jakarta_Sans'] text-teal-800">Recent Orders</h2>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-gray-600 font-medium text-sm">
                            <th class="p-4">Order ID</th>
                            <th class="p-4">Customer Details</th>
                            <th class="p-4">Item Ordered</th>
                            <th class="p-4">Amount</th>
                            <th class="p-4">Payment Method</th>
                            <th class="p-4">Date</th>
                        </tr>
                    </thead>
                    <tbody id="ordersList">
                        <tr><td colspan="6" class="text-center p-8 text-gray-500">Loading orders...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        const menuList = document.getElementById('menuList');
        const addItemForm = document.getElementById('addItemForm');

        // Fetch and display items
        async function fetchMenuItems() {
            try {
                const response = await fetch('/api/menu');
                const items = await response.json();
                
                menuList.innerHTML = '';
                if(items.length === 0) {
                    menuList.innerHTML = '<div class="text-center text-gray-500 py-8 bg-white rounded-xl shadow-sm border border-gray-100">No menu items found.</div>';
                    return;
                }

                items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between gap-4';
                    el.innerHTML = `
                        <div class="flex items-center gap-4">
                            <img src="${item.imageUrl || 'https://via.placeholder.com/80'}" class="w-20 h-20 object-cover rounded-lg bg-gray-100" onerror="this.src='https://via.placeholder.com/80'">
                            <div>
                                <h3 class="font-bold text-lg text-gray-900">${item.name} <span class="text-sm font-normal text-teal-600 bg-teal-50 px-2 py-0.5 rounded-full ml-2">${item.category}</span></h3>
                                <p class="text-sm text-gray-500 line-clamp-1">${item.description}</p>
                                <p class="font-medium text-teal-700 mt-1">$${parseFloat(item.price).toFixed(2)}</p>
                            </div>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition" title="Delete">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    `;
                    menuList.appendChild(el);
                });
            } catch (error) {
                console.error('Error fetching menu:', error);
                menuList.innerHTML = '<div class="text-center text-red-500 py-8">Error loading items. Is the server running?</div>';
            }
        }

        // Add new item
        addItemForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newItem = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                price: document.getElementById('price').value,
                category: document.getElementById('category').value,
                imageUrl: document.getElementById('imageUrl').value
            };

            try {
                const response = await fetch('/api/menu', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newItem)
                });
                
                if (response.ok) {
                    addItemForm.reset();
                    fetchMenuItems();
                } else {
                    alert("Failed to add item");
                }
            } catch (error) {
                console.error('Error adding item:', error);
            }
        });

        // Delete item
        async function deleteItem(id) {
            if(!confirm("Are you sure you want to delete this item?")) return;
            
            try {
                const response = await fetch(`/api/menu/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchMenuItems();
                } else {
                    alert("Failed to delete item");
                }
            } catch (error) {
                console.error('Error deleting item:', error);
            }
        }

        // Fetch and display orders
        async function fetchOrders() {
            const ordersList = document.getElementById('ordersList');
            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();
                
                ordersList.innerHTML = '';
                if(orders.length === 0) {
                    ordersList.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-gray-500">No orders placed yet.</td></tr>';
                    return;
                }

                orders.forEach(order => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-50 hover:bg-gray-50/50';
                    tr.innerHTML = `
                        <td class="p-4 font-medium text-gray-900">#${order.id}</td>
                        <td class="p-4">
                            <div class="font-medium text-gray-900">${order.customer_name}</div>
                            <div class="text-sm text-gray-500">${order.customer_phone}</div>
                            <div class="text-sm text-gray-500">${order.customer_email || 'N/A'}</div>
                        </td>
                        <td class="p-4">
                            <div class="font-medium text-gray-900">${order.item_name} (x${order.quantity})</div>
                        </td>
                        <td class="p-4 font-medium text-teal-700">$${parseFloat(order.total_price).toFixed(2)}</td>
                        <td class="p-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                ${order.payment_method}
                            </span>
                        </td>
                        <td class="p-4 text-sm text-gray-500">${new Date(order.timestamp).toLocaleString()}</td>
                    `;
                    ordersList.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching orders:', error);
                ordersList.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-red-500">Error loading orders.</td></tr>';
            }
        }

        // Initial load
        fetchMenuItems();
        fetchOrders();
    </script>
</body>
</html>
